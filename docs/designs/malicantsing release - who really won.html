/* ---------- Reveal ---------- */
function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.classList.add('in'); io.unobserve(el); }
    }, { threshold: 0.12 });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return ref;
}
const Reveal = ({ as: As = 'div', className = '', children, delay = 0 }) => {
  const r = useReveal();
  return <As ref={r} className={`reveal ${className}`} style={{ transitionDelay: `${delay}ms` }}>{children}</As>;
};

/* ---------- App ---------- */
function App() {
  // Toggle nav-on-dark while hero is in view
  const heroRef = useRef(null);
  useEffect(() => {
    if (!heroRef.current) return;
    const io = new IntersectionObserver(([e]) => {
      document.body.classList.toggle('nav-on-dark', e.isIntersecting && e.intersectionRatio > 0.35);
    }, { threshold: [0, 0.35, 0.7, 1] });
    io.observe(heroRef.current);
    return () => { io.disconnect(); document.body.classList.remove('nav-on-dark'); };
  }, []);

  return (
    <main className="w-full overflow-x-clip">
      <Nav />
      <div ref={heroRef}><Hero /></div>
      <StreamingRow />
      <Tracklist />
      <MusicVideo />
      <Credits />
      <PrevNext />
      <Footer />
    </main>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
