/* ---------- Reveal ---------- */
function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.classList.add('in'); io.unobserve(el); }
    }, { threshold: 0.12 });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return ref;
}
const Reveal = ({ as: As = 'div', className = '', children, delay = 0 }) => {
  const r = useReveal();
  return <As ref={r} className={`reveal ${className}`} style={{ transitionDelay: `${delay}ms` }}>{children}</As>;
};

          <p className="mt-8 md:mt-10 font-display italic text-[24px] md:text-[30px] leading-[1.35] max-w-[34ch]" style={{ color: 'var(--ink-2)' }}>
            no published features yet. when there are, they go here — verbatim, with links to the outlet.
          </p>
        </Reveal>

        <div className="mt-10 md:mt-14 grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6">
          {[1,2].map((i) => (
            <Reveal key={i} delay={i * 80}>
              <div className="relative p-6 md:p-8 h-full" style={{ border: '1px dashed var(--rule)', minHeight: 220 }}>
                <div className="flex items-baseline justify-between font-mono text-[10px] uppercase tracking-[0.24em]" style={{ color: 'var(--ink-3)' }}>
                  <span>slot {String(i).padStart(2,'0')} / vacant</span>
                  <span>—</span>
                </div>
                <div className="mt-12 md:mt-16 font-display italic" style={{ fontSize: 'clamp(28px, 3.2vw, 42px)', lineHeight: 1.1, color: 'var(--ink-3)' }}>
                  press coverage <br /> coming soon.
                </div>
                <div className="mt-6 font-mono text-[10px] uppercase tracking-[0.24em]" style={{ color: 'var(--ink-3)' }}>
                  outlet · author · date
                </div>
              </div>
            </Reveal>
          ))}
        </div>

        <Reveal delay={240}>
          <div className="mt-6 font-mono text-[10px] uppercase tracking-[0.24em]" style={{ color: 'var(--ink-3)' }}>
            no fake quotes. no inflated claims. this page updates only when something real comes in.
          </div>
        </Reveal>
      </div>
    </section>
  );
}
