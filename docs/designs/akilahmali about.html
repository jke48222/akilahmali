/* ---------- Reveal ---------- */
function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.classList.add('in'); io.unobserve(el); }
    }, { threshold: 0.12 });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return ref;
}
const Reveal = ({ as: As = 'div', className = '', children, delay = 0 }) => {
  const r = useReveal();
  return <As ref={r} className={`reveal ${className}`} style={{ transitionDelay: `${delay}ms` }}>{children}</As>;
};

            <span>02 / gallery</span>
            <span className="block h-px flex-1" style={{ background: 'var(--rule)' }} />
            <span>six frames · click to expand</span>
          </div>
        </Reveal>

        <div className="mt-10 md:mt-14 grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-5 lg:gap-6">
          {gallery.map((g, i) => (
            <Reveal key={i} delay={(i % 3) * 80}>
              <button onClick={() => onOpen(i)} className="group block w-full text-left">
                <div className="relative aspect-square field overflow-hidden">
                  {g.kind === 'photo' ? (
                    <img src={g.src} alt={g.label} className="photo absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-[1.02]"
                         style={{ objectPosition: g.pos }} />
                  ) : (
                    <div className={`absolute inset-0 ${g.cls} transition-transform duration-700 group-hover:scale-[1.02]`} />
                  )}
                  {/* hover expand affordance */}
                  <span className="absolute top-3 right-3 opacity-0 group-hover:opacity-100 transition-opacity duration-500 inline-flex items-center justify-center w-7 h-7 rounded-full"
                        style={{ background: 'rgba(15,10,12,0.55)', color: 'rgba(232,226,214,0.95)' }}>
                    <Icon.Expand width="12" height="12" />
                  </span>
                  {/* burn label */}
                  <span className="absolute bottom-3 left-3 font-mono text-[10px] uppercase tracking-[0.26em]"
                        style={{ color: 'rgba(232,226,214,0.78)' }}>
                    {String(i+1).padStart(2,'0')} · {g.label}
                  </span>
                </div>
              </button>
            </Reveal>
          ))}
        </div>

        <Reveal delay={200}>
          <div className="mt-6 font-mono text-[10px] uppercase tracking-[0.24em]" style={{ color: 'var(--ink-3)' }}>
            photos: mali + collaborators. all images &copy; 2025 akilah mali.
          </div>
        </Reveal>
      </div>
    </section>
  );
}

/* ---------- Lightbox ---------- */
function Lightbox({ index, onClose }) {
  const [active, setActive] = useState(index);
  const [mounted, setMounted] = useState(false);
  useEffect(() => {
    setMounted(true);
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowRight') setActive(a => (a + 1) % gallery.length);
      if (e.key === 'ArrowLeft') setActive(a => (a - 1 + gallery.length) % gallery.length);
    };
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, [onClose]);

  const g = gallery[active];

  return (
    <div className={`fixed inset-0 z-[100] lb-back lb-anim ${mounted ? 'in' : ''}`} onClick={onClose}>
      <div className="absolute inset-0 flex flex-col">
        {/* top bar */}
        <div className="flex items-center justify-between px-6 md:px-10 lg:px-14 pt-5 md:pt-7 pb-4" onClick={e=>e.stopPropagation()}>
          <div className="font-mono text-[10px] uppercase tracking-[0.28em]" style={{ color: 'rgba(232,226,214,0.7)' }}>
            {String(active+1).padStart(2,'0')} / {String(gallery.length).padStart(2,'0')} &nbsp;·&nbsp; {g.caption}
          </div>
          <button onClick={onClose} aria-label="close"
                  className="font-mono text-[11px] uppercase tracking-[0.24em] inline-flex items-center gap-2 ulink"
                  style={{ color: 'rgba(232,226,214,0.85)' }}>
            close <Icon.Close width="14" height="14" />
          </button>
        </div>
        {/* content */}
        <div className="flex-1 flex items-center justify-center px-6 md:px-10 pb-10" onClick={e=>e.stopPropagation()}>
          <div className="relative w-full h-full flex items-center justify-center">
            {g.kind === 'photo' ? (
              <img src={g.src} alt="" className="photo max-h-full max-w-full object-contain"
                   style={{ maxHeight: '78vh', boxShadow: '0 30px 60px -20px rgba(0,0,0,0.7)' }} />
            ) : (
              <div className={`field ${g.cls}`} style={{ width: 'min(78vh, 92vw)', height: 'min(78vh, 92vw)' }} />
            )}
          </div>
        </div>
        {/* bottom bar */}
        <div className="flex items-center justify-between px-6 md:px-10 lg:px-14 pb-6" onClick={e=>e.stopPropagation()}>
          <button onClick={() => setActive(a => (a - 1 + gallery.length) % gallery.length)}
                  className="font-mono text-[11px] uppercase tracking-[0.24em] inline-flex items-center gap-2 ulink"
                  style={{ color: 'rgba(232,226,214,0.85)' }}>
            <span style={{ transform: 'scaleX(-1)', display: 'inline-block' }}><Icon.Arrow width="14" height="14" /></span> prev
          </button>
          <div className="font-mono text-[10px] uppercase tracking-[0.24em]" style={{ color: 'rgba(232,226,214,0.55)' }}>
            esc to close &nbsp;·&nbsp; ← → to flip
          </div>
          <button onClick={() => setActive(a => (a + 1) % gallery.length)}
                  className="font-mono text-[11px] uppercase tracking-[0.24em] inline-flex items-center gap-2 ulink"
                  style={{ color: 'rgba(232,226,214,0.85)' }}>
            next <Icon.Arrow width="14" height="14" />
          </button>
        </div>
      </div>
    </div>
  );
}

  return (

      <div className="mx-auto max-w-[1480px] px-6 md:px-10 lg:px-14 pt-24 md:pt-36">
        <div className="mx-auto" style={{ maxWidth: '620px' }}>
          <Reveal>

              <div>
                <span style={{ color: 'var(--ink-3)' }}>say hi —</span> &nbsp;

              </div>
              <div>
                <span style={{ color: 'var(--ink-3)' }}>elsewhere —</span> &nbsp;
                <a href="#" className="ulink">instagram</a> &nbsp;·&nbsp;
                <a href="#" className="ulink">tiktok</a> &nbsp;·&nbsp;
                <a href="#" className="ulink">youtube</a> &nbsp;·&nbsp;

/* ---------- App ---------- */
function App() {
  const [lbIndex, setLbIndex] = useState(null);

  // Toggle nav-on-dark while the lead is in view
  const leadRef = useRef(null);
  useEffect(() => {
    if (!leadRef.current) return;
    const io = new IntersectionObserver(([e]) => {
      document.body.classList.toggle('nav-on-dark', e.isIntersecting && e.intersectionRatio > 0.25);
    }, { threshold: [0, 0.25, 0.6, 1] });
    io.observe(leadRef.current);
    return () => { io.disconnect(); document.body.classList.remove('nav-on-dark'); };
  }, []);

  return (
    <main className="w-full overflow-x-clip">
      <Nav />
      <div ref={leadRef}><Lead /></div>
      <TitleBlock />
      <Bio />
      <PullQuote />
      <Gallery onOpen={setLbIndex} />
      <Closing />
      <Footer />
      {lbIndex !== null && <Lightbox index={lbIndex} onClose={() => setLbIndex(null)} />}
    </main>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
