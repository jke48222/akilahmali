      <stop offset="0" stop-color="#E2453C"/>
      <stop offset="0.5" stop-color="#C21A18"/>
      <stop offset="1" stop-color="#810100"/>
    </radialGradient>
  </defs>
  <!-- rose bloom, top view — transparent background -->
  <!-- outer ring of petals -->
  <path
