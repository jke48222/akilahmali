        fill="none" stroke="#5A0707" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="24" cy="23.2" r="1.5" fill="#7E0C0A"/>
  <!-- soft highlight on the upper-left petal -->
  <path d="M17.8 15.6 Q20.2 11.8 24 10.6" fill="none" stroke="#F3A39C" stroke-width="1.1" stroke-opacity="0.45" stroke-linecap="round"/>
